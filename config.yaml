adapters:
  logger: console
  repository: mongodb
  multitenant: false
  mongodb:
    uri: mongodb://localhost:5971
    db_name: agent-recipe-creator
api:
  host: 0.0.0.0
  port: 8006
  reload: true
mcp:
  host: 127.0.0.1
  port: 8004
soft_delete:
  retention_days: 30
# ── Agent config ──────────────────────────────────────────────────────────────
mcp_registry:
  url: http://127.0.0.1:8302/mcp  # URL du service Rekipe exposant les tools MCP
lm:
  planner:
    provider: anthropic
    model_name: claude-haiku-4-5
    api_key: ${ANTHROPIC_API_KEY}
    # Pour un LLM local (LM Studio / Ollama) :
    # provider: openai
    # model_name: qwen/qwen3.5-9b:2
    # base_url: http://127.0.0.1:1234/v1
    # api_key: lm-studio
fuzzy:
  threshold: 80
